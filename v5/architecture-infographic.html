<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antriksh Cloud - Three Layer Architecture</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800&family=Rajdhani:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #dfe6ed 0%, #e8edf3 50%, #edf1f5 100%);
    font-family: 'Exo 2', sans-serif;
  }

  .wrapper {
    position: relative;
    width: 660px;
    height: 900px;
  }

  svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  /* Float animation */
  .layer-group {
    animation: floatUp 5s ease-in-out infinite;
  }
  .layer-group.mid { animation-delay: 0.4s; }
  .layer-group.bot { animation-delay: 0.8s; }

  @keyframes floatUp {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }
</style>
</head>
<body>
<div class="wrapper">
<svg viewBox="0 0 660 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Nucleaton top face gradient -->
    <linearGradient id="nucTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f4c75"/>
      <stop offset="50%" stop-color="#0b3a5c"/>
      <stop offset="100%" stop-color="#082d4a"/>
    </linearGradient>
    <!-- Nucleaton left face -->
    <linearGradient id="nucLeft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b6fa0"/>
      <stop offset="100%" stop-color="#0f5580"/>
    </linearGradient>
    <!-- Nucleaton right face -->
    <linearGradient id="nucRight" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a3050"/>
      <stop offset="100%" stop-color="#072540"/>
    </linearGradient>

    <!-- Supercomputer top face -->
    <linearGradient id="superTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4cc5c0"/>
      <stop offset="40%" stop-color="#2ba0a5"/>
      <stop offset="100%" stop-color="#1a7a82"/>
    </linearGradient>
    <!-- Supercomputer left face -->
    <linearGradient id="superLeft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3abcc0"/>
      <stop offset="100%" stop-color="#1a8a90"/>
    </linearGradient>
    <!-- Supercomputer right face -->
    <linearGradient id="superRight" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#105a65"/>
      <stop offset="100%" stop-color="#0d4550"/>
    </linearGradient>

    <!-- Datacenter top face -->
    <linearGradient id="dcTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4aace0"/>
      <stop offset="50%" stop-color="#2a8ac5"/>
      <stop offset="100%" stop-color="#1a70aa"/>
    </linearGradient>
    <!-- Datacenter left face -->
    <linearGradient id="dcLeft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#50b8e8"/>
      <stop offset="100%" stop-color="#2a90c5"/>
    </linearGradient>
    <!-- Datacenter right face -->
    <linearGradient id="dcRight" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f4a70"/>
      <stop offset="100%" stop-color="#0a3555"/>
    </linearGradient>

    <!-- Diamond item gradient -->
    <linearGradient id="diamondItem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a8a95"/>
      <stop offset="50%" stop-color="#136a75"/>
      <stop offset="100%" stop-color="#0d5560"/>
    </linearGradient>
    <linearGradient id="diamondItem2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a8590"/>
      <stop offset="100%" stop-color="#0f6570"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="layerShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0a2a40" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- ============ LEFT ARROWS ============ -->
  <g opacity="0.55">
    <polygon points="55,340 65,360 75,340" fill="#6ab5d8">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-4;0,0" dur="2s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="55,370 65,390 75,370" fill="#6ab5d8">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" begin="0.3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-4;0,0" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="55,400 65,420 75,400" fill="#6ab5d8">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" begin="0.6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-4;0,0" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- ============ RIGHT ARROWS ============ -->
  <g opacity="0.55">
    <polygon points="585,340 595,360 605,340" fill="#6ab5d8">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" begin="0.1s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-4;0,0" dur="2s" begin="0.1s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="585,370 595,390 605,370" fill="#6ab5d8">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" begin="0.4s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-4;0,0" dur="2s" begin="0.4s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="585,400 595,420 605,400" fill="#6ab5d8">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" begin="0.7s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-4;0,0" dur="2s" begin="0.7s" repeatCount="indefinite"/>
    </polygon>
  </g>


  <!-- ================================================ -->
  <!-- NUCLEATON™ - TOP LAYER                            -->
  <!-- ================================================ -->
  <g class="layer-group" filter="url(#layerShadow)">
    <text x="330" y="60" text-anchor="middle" font-family="'Exo 2', sans-serif" font-size="36" font-weight="800" fill="#0a3d6b" letter-spacing="5">
      NUCLEATON™
    </text>

    <!-- Top face -->
    <polygon points="330,100 520,175 330,250 140,175" fill="url(#nucTop)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <!-- Left face -->
    <polygon points="140,175 330,250 330,285 140,210" fill="url(#nucLeft)"/>
    <!-- Right face -->
    <polygon points="520,175 330,250 330,285 520,210" fill="url(#nucRight)"/>
    <!-- Bottom edge -->
    <polygon points="140,210 330,285 520,210" fill="#061e30" opacity="0.3"/>

    <text x="245" y="182" text-anchor="middle" font-family="'Rajdhani', sans-serif" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="3">TRAINING</text>
    <text x="415" y="182" text-anchor="middle" font-family="'Rajdhani', sans-serif" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="3">INFERENCE</text>
  </g>


  <!-- ================================================ -->
  <!-- C-GEN.AI SUPERCOMPUTER - MIDDLE LAYER             -->
  <!-- ================================================ -->
  <g class="layer-group mid" filter="url(#layerShadow)">
    <!-- Top face -->
    <polygon points="330,330 540,420 330,510 120,420" fill="url(#superTop)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <!-- Left face -->
    <polygon points="120,420 330,510 330,580 120,490" fill="url(#superLeft)"/>
    <!-- Right face -->
    <polygon points="540,420 330,510 330,580 540,490" fill="url(#superRight)"/>
    <!-- Bottom edge -->
    <polygon points="120,490 330,580 540,490" fill="#082530" opacity="0.25"/>

    <text x="330" y="400" text-anchor="middle" font-family="'Exo 2', sans-serif" font-size="13" font-weight="300" fill="#ffffff" letter-spacing="2" opacity="0.9">☁</text>
    <text x="330" y="418" text-anchor="middle" font-family="'Exo 2', sans-serif" font-size="14" font-weight="400" fill="#ffffff" letter-spacing="2" opacity="0.9">C-Gen.AI</text>
    <text x="330" y="440" text-anchor="middle" font-family="'Exo 2', sans-serif" font-size="19" font-weight="700" fill="#ffffff" letter-spacing="4">SUPERCOMPUTER</text>

    <!-- User Management -->
    <polygon points="210,465 265,488 210,511 155,488" fill="url(#diamondItem)" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
    <text x="210" y="486" text-anchor="middle" font-family="'Rajdhani', sans-serif" font-size="10" font-weight="600" fill="#fff" letter-spacing="0.5">USER</text>
    <text x="210" y="497" text-anchor="middle" font-family="'Rajdhani', sans-serif" font-size="10" font-weight="600" fill="#fff" letter-spacing="0.5">MANAGEMENT</text>

    <!-- Network Config -->
    <polygon points="450,465 505,488 450,511 395,488" fill="url(#diamondItem)" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
    <text x="450" y="486" text-anchor="middle" font-family="'Rajdhani', sans-serif" font-size="10" font-weight="600" fill="#fff" letter-spacing="0.5">NETWORK</text>
    <text x="450" y="497" text-anchor="middle" font-family="'Rajdhani', sans-serif" font-size="10" font-weight="600" fill="#fff" letter-spacing="0.5">CONFIG</text>

    <!-- Storage -->
    <polygon points="270,495 325,518 270,541 215,518" fill="url(#diamondItem2)" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
    <text x="270" y="521" text-anchor="middle" font-family="'Rajdhani', sans-serif" font-size="10" font-weight="600" fill="#fff" letter-spacing="0.5">STORAGE</text>

    <!-- Job Orchestration -->
    <polygon points="390,495 445,518 390,541 335,518" fill="url(#diamondItem2)" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
    <text x="390" y="515" text-anchor="middle" font-family="'Rajdhani', sans-serif" font-size="10" font-weight="600" fill="#fff" letter-spacing="0.5">JOB</text>
    <text x="390" y="526" text-anchor="middle" font-family="'Rajdhani', sans-serif" font-size="10" font-weight="600" fill="#fff" letter-spacing="0.5">ORCHESTRATION</text>

    <!-- Monitoring -->
    <polygon points="330,530 385,553 330,576 275,553" fill="url(#diamondItem)" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
    <text x="330" y="556" text-anchor="middle" font-family="'Rajdhani', sans-serif" font-size="10" font-weight="600" fill="#fff" letter-spacing="0.5">MONITORING</text>
  </g>


  <!-- ================================================ -->
  <!-- DATACENTER - BOTTOM LAYER                         -->
  <!-- ================================================ -->
  <g class="layer-group bot" filter="url(#layerShadow)">
    <!-- Top face -->
    <polygon points="330,640 540,730 330,820 120,730" fill="url(#dcTop)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <!-- Left face -->
    <polygon points="120,730 330,820 330,870 120,780" fill="url(#dcLeft)"/>
    <!-- Right face -->
    <polygon points="540,730 330,820 330,870 540,780" fill="url(#dcRight)"/>
    <!-- Bottom edge -->
    <polygon points="120,780 330,870 540,780" fill="#061830" opacity="0.25"/>

    <text x="330" y="745" text-anchor="middle" font-family="'Exo 2', sans-serif" font-size="26" font-weight="800" fill="#ffffff" letter-spacing="5">DATACENTER</text>

    <text x="240" y="790" text-anchor="middle" font-family="'Rajdhani', sans-serif" font-size="16" font-weight="600" fill="#ffffff" letter-spacing="2">GPUs</text>
    <text x="420" y="790" text-anchor="middle" font-family="'Rajdhani', sans-serif" font-size="16" font-weight="600" fill="#ffffff" letter-spacing="2">VM/OS</text>
    <text x="330" y="830" text-anchor="middle" font-family="'Rajdhani', sans-serif" font-size="16" font-weight="600" fill="#ffffff" letter-spacing="2">NETWORKING</text>
  </g>

</svg>
</div>
</body>
</html>
